name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: lint-ai-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: lint-ai-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: lint-ai-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/lint-ai dist/${{ matrix.asset_name }}
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\${{ matrix.target }}\release\lint-ai.exe dist\${{ matrix.asset_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
